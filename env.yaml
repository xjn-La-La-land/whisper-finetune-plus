name: asr
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - ipykernel
  - ffmpeg=7.1.1
  - pip
  - pip:
      # 核心深度学习框架
      - torch==2.7.1 --index-url https://download.pytorch.org/whl/cu128
      - torchvision==0.22.1
      - torchaudio==2.7.1
      - torchcodec==0.5.0
      - tensorflow==2.12.0
      - keras==2.12.0
      - numpy==1.23.5
      - flash-attn --no-build-isolation 
      
      # HuggingFace 相关
      - transformers==4.42.1
      - datasets==4.0.0
      - peft==0.10.0
      - evaluate
      - bitsandbytes
      
      # 语音处理与通用工具
      - librosa
      - soundfile
      - zhconv
      - tqdm
      - aiofiles
      
      # 接口与服务端
      - fastapi
      - pydantic
      - uvicorn
      - python-multipart