<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音采集与微调控制台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* 定义左右滑动的丝滑过场动画 */
        .slide-left-enter-active, .slide-left-leave-active,
        .slide-right-enter-active, .slide-right-leave-active {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 前进：新页面从右边滑入，老页面向左边退去 */
        .slide-left-enter-from { opacity: 0; transform: translateX(40px); }
        .slide-left-leave-to { opacity: 0; transform: translateX(-40px); }

        /* 后退：新页面从左边滑入，老页面向右边退去 */
        .slide-right-enter-from { opacity: 0; transform: translateX(-40px); }
        .slide-right-leave-to { opacity: 0; transform: translateX(40px); }

        .transcript-text {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
            letter-spacing: 0.02em;
            text-shadow: 0 0 12px rgba(59, 130, 246, 0.08);
        }

        .transcript-card {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.95), rgba(30, 41, 59, 0.96));
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.35);
        }
    </style>
</head>
<body class="bg-blue-50 font-sans min-h-screen pb-28 text-gray-800">
    <div id="app" class="max-w-5xl mx-auto px-4 relative h-full">
        
        <div v-if="!currentUser" class="fixed inset-0 z-[200] bg-blue-50/95 backdrop-blur-md flex items-center justify-center">
            <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full mx-4 border border-blue-100 text-center transform transition-all">
                <h2 class="text-2xl font-extrabold text-gray-800 mb-2">欢迎来到whisper语音识别小助手！</h2>
                <p class="text-gray-500 mb-8 text-sm">请输入你的专属代号╰(*°▽°*)╯</p>
                <input v-model="loginInput" @keyup.enter="handleAuth('login')" type="text" placeholder="例如：哈基米/LolCat" class="w-full bg-gray-50 border-2 border-gray-200 rounded-2xl px-5 py-4 text-lg text-center font-bold focus:outline-none focus:border-blue-400 focus:bg-white transition mb-6 shadow-sm placeholder-gray-300">
                <div class="flex flex-col gap-3">
                    <button @click="handleAuth('login')" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-extrabold text-lg py-4 rounded-2xl shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-1 active:translate-y-0">直接登录</button>
                    <button @click="handleAuth('register')" class="w-full bg-white text-blue-600 border-2 border-blue-100 hover:bg-blue-50 font-extrabold text-lg py-3 rounded-2xl transition shadow-sm hover:-translate-y-1 active:translate-y-0">注册新代号</button>
                </div>
            </div>
        </div>

        <div v-if="currentUser">
            <div class="sticky top-0 z-50 bg-blue-50/60 backdrop-blur-xl pt-5 pb-3 mb-4 -mx-4 px-4 border-b border-white/40 shadow-sm transition-all">
                <div class="flex items-center justify-between max-w-3xl mx-auto">
                    <div class="flex-1"></div>
                    <h1 class="text-2xl md:text-3xl font-extrabold text-blue-600 text-center tracking-wider flex items-center justify-center gap-2 flex-[2] whitespace-nowrap">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        whisper语音识别小助手
                    </h1>
                    <div class="flex-1 flex justify-end">
                        <div class="bg-white/80 border border-blue-100 rounded-full pl-3 pr-1 py-1 flex items-center gap-2 shadow-sm text-sm font-bold text-gray-600">
                            👤 {{ currentUser }}
                            <button @click="handleLogout" title="退出登录" class="bg-gray-100 hover:bg-red-50 hover:text-red-500 p-1.5 rounded-full transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
                        </div>
                    </div>
                </div>
            </div>

            <transition :name="transitionName" mode="out-in">
                <keep-alive>
                    <component :is="currentTab" :current-user="currentUser"></component>
                </keep-alive>
            </transition>
            
            <div v-if="!isCollectOnly" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-full max-w-xl px-4 sm:px-0">
                <div class="relative flex w-full bg-white/70 backdrop-blur-xl p-1.5 rounded-2xl shadow-2xl border border-white/60">
                    
                    <div class="absolute top-1.5 bottom-1.5 w-[calc(33.33%-6px)] bg-blue-500 rounded-xl shadow-md transition-all duration-500 cubic-bezier(0.4, 0, 0.2, 1) z-0"
                         :class="currentTab === 'AudioCollector' ? 'left-1.5' : (currentTab === 'FinetunePanel' ? 'left-[33.33%]' : 'left-[calc(66.66%+1.5px)]')">
                    </div>

                    <button @click="changeTab('AudioCollector')" class="relative z-10 flex-1 py-3 flex items-center justify-center gap-2 rounded-xl font-extrabold text-sm md:text-base transition-colors duration-300" :class="currentTab === 'AudioCollector' ? 'text-white' : 'text-gray-500 hover:text-blue-500'">🎙️ 音频采集</button>
                    <button @click="changeTab('FinetunePanel')" class="relative z-10 flex-1 py-3 flex items-center justify-center gap-2 rounded-xl font-extrabold text-sm md:text-base transition-colors duration-300" :class="currentTab === 'FinetunePanel' ? 'text-white' : 'text-gray-500 hover:text-blue-500'">⚙️ 模型微调</button>
                    <button @click="changeTab('InferencePanel')" class="relative z-10 flex-1 py-3 flex items-center justify-center gap-2 rounded-xl font-extrabold text-sm md:text-base transition-colors duration-300" :class="currentTab === 'InferencePanel' ? 'text-white' : 'text-gray-500 hover:text-blue-500'">✨ 语音识别</button>
                </div>
            </div>
        </div>
    </div>

    <template id="tpl-audio-collector">
        <div>
            <div class="sticky top-[76px] z-40 bg-blue-50/40 backdrop-blur-lg pt-2 pb-4 mb-4 -mx-4 px-4 sm:mx-0 sm:px-0">
                <div class="mb-5 px-1 max-w-3xl mx-auto flex items-end gap-4">
                    <div class="flex-1">
                        <div class="flex justify-between text-sm font-bold text-gray-500 mb-1">
                            <span>当前录音进度</span>
                            <span class="text-blue-600">{{ completedCount }} / {{ tasks.length }} ({{ progressPercentage }}%)</span>
                        </div>
                        <div class="w-full bg-gray-200/80 rounded-full h-2.5 overflow-hidden shadow-inner">
                            <div class="bg-gradient-to-r from-green-400 to-green-500 h-2.5 rounded-full transition-all duration-500 ease-out" :style="{ width: progressPercentage + '%' }"></div>
                        </div>
                    </div>
                    <button v-if="tasks.length > 0" @click="clearAllTasks" class="flex-shrink-0 text-red-500 hover:text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-xl text-sm font-bold transition flex items-center gap-1.5 border border-transparent hover:border-red-100 shadow-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>清空全部</button>
                </div>
                <div class="bg-white/90 p-3 rounded-2xl shadow-sm border border-white flex flex-col md:flex-row gap-4 justify-between items-center">
                    <div class="flex items-center gap-2 w-full md:w-auto">
                        <input type="file" ref="txtInput" accept=".txt" class="block w-full text-sm text-gray-500 file:mr-3 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-600 hover:file:bg-blue-100 transition-colors" />
                        
                        <div class="relative group flex items-center cursor-help">
                            <span class="text-gray-400 hover:text-blue-500 text-xl transition-colors">❓</span>
                            <div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-56 p-3 bg-gray-800 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-xl">
                                <p class="font-bold mb-1 text-blue-300">TXT 格式示例 (每行一句)：</p>
                                <p class="text-gray-200 leading-relaxed">今天天气真好。<br>我想吃冰淇淋。<br>床前明月光。</p>
                                <div class="absolute -top-2 left-1/2 -translate-x-1/2 w-0 h-0 border-l-8 border-r-8 border-b-8 border-transparent border-b-gray-800"></div>
                            </div>
                        </div>

                        <button @click="uploadTxt" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold transition whitespace-nowrap ml-1 shadow-sm flex items-center gap-1.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>导入</button>
                    </div>
                    <div class="flex items-center gap-2 w-full md:w-auto">
                        <input v-model="newTaskText" type="text" placeholder="手动输入一句文本..." class="flex-1 md:w-64 border border-gray-200 bg-gray-50 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition" @keyup.enter="addTask" />
                        <button @click="addTask" class="bg-green-500 hover:bg-green-600 text-white px-5 py-2.5 rounded-xl font-bold transition whitespace-nowrap shadow-sm flex items-center gap-1.5"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>添加</button>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <div v-for="(task, index) in tasks" :key="task.id" @click="openFocusMode(index)" class="bg-white p-4 rounded-2xl shadow-sm border border-transparent group relative flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all hover:shadow-md hover:scale-[1.01] cursor-pointer" :class="task.is_completed ? 'bg-green-50/40 border-green-200' : 'hover:border-blue-200'">
                    
                    <div class="flex items-center flex-1 pr-10 md:pr-4">
                        <span class="flex-shrink-0 bg-blue-50 text-blue-600 rounded-full w-9 h-9 flex items-center justify-center font-bold mr-4 shadow-sm border border-blue-100">{{ index + 1 }}</span>
                        <div class="flex-1">
                            <div v-if="editingTaskId === task.id" class="flex gap-2 w-full" @click.stop>
                                <input v-model="editingTaskText" type="text" class="flex-1 border-b-2 border-blue-400 focus:outline-none px-1 text-lg font-medium text-gray-800 bg-blue-50/50 rounded-t" @keyup.enter="saveEdit(task.id)" />
                                <button @click="saveEdit(task.id)" class="text-green-600 font-bold hover:bg-green-100 px-3 py-1 rounded transition whitespace-nowrap">保存</button>
                                <button @click="cancelEdit" class="text-gray-400 font-bold hover:bg-gray-100 px-3 py-1 rounded transition whitespace-nowrap">取消</button>
                            </div>
                            <p v-else class="text-lg font-medium text-gray-700 leading-snug">{{ task.text_content }}</p>
                        </div>
                    </div>

                    <div v-if="editingTaskId !== task.id" class="absolute top-4 right-4 md:static md:opacity-0 md:group-hover:opacity-100 transition-opacity flex gap-2" @click.stop>
                        <button @click="startEditing(task)" title="修改" class="text-gray-400 hover:text-blue-500 p-1.5 rounded-lg hover:bg-blue-50 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                        <button @click="deleteTask(task.id)" title="删除" class="text-gray-400 hover:text-red-500 p-1.5 rounded-lg hover:bg-red-50 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>
                    
                    <div class="flex items-center gap-3 w-full md:w-auto justify-end mt-2 md:mt-0 p-2 md:p-0 rounded-xl" @click.stop>
                        <button v-if="processingTaskId === task.id" disabled class="bg-gray-200 text-gray-500 px-5 py-2 rounded-full font-bold flex items-center gap-2 cursor-not-allowed text-sm whitespace-nowrap">
                            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>处理中
                        </button>
                        <button v-else-if="recordingTaskId === task.id" @click.stop="stopRecording(task.id)" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-full font-bold transition flex items-center gap-2 animate-pulse text-sm whitespace-nowrap shadow-md shadow-red-500/30">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>停止
                        </button>
                        <button v-else @click.stop="startRecording(task.id)" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-full font-bold transition flex items-center gap-1.5 text-sm whitespace-nowrap shadow-sm shadow-blue-500/30" :class="task.is_completed ? 'bg-orange-400 hover:bg-orange-500 shadow-orange-500/30' : ''">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>{{ task.is_completed ? '重录' : '录音' }}
                        </button>

                        <div v-if="task.is_completed && processingTaskId !== task.id" class="hidden sm:flex items-center gap-1 bg-green-100/80 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold border border-green-200 shadow-inner">
                            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>完成
                        </div>
                        
                        <custom-audio v-if="task.is_completed && task.audio_path && processingTaskId !== task.id" :src="task.audio_path"></custom-audio>
                    </div>
                </div>
                
                <div v-if="tasks.length === 0" class="text-center py-20 text-gray-400 font-medium">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                    <p>该代号下还没有任务哦，请在上方导入文本或手动添加吧！</p>
                </div>
            </div>

            <div v-if="focusedTaskIndex !== null && focusedTask" class="fixed inset-0 z-[100] flex items-center justify-center">
                <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" @click="closeFocusMode"></div>

                <div class="relative z-10 w-full max-w-5xl px-4 flex items-center justify-between pointer-events-none">
                    
                    <button @click.stop="prevFocusTask" :disabled="focusedTaskIndex === 0" class="pointer-events-auto p-3 md:p-5 rounded-full bg-white/20 text-white hover:bg-white/30 disabled:opacity-0 disabled:cursor-not-allowed transition transform hover:-translate-x-2 shadow-xl backdrop-blur-sm">
                        <svg class="w-8 h-8 md:w-10 md:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    </button>

                    <div class="pointer-events-auto bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl mx-2 md:mx-6 p-8 md:p-14 flex flex-col items-center text-center transform transition-all duration-300 border border-blue-50 relative">
                        
                        <button @click.stop="closeFocusMode" class="absolute top-6 right-6 text-gray-400 hover:text-gray-600 transition transform hover:rotate-90 bg-gray-100 rounded-full p-2">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>

                        <div class="bg-blue-100 text-blue-700 px-5 py-1.5 rounded-full text-sm font-extrabold mb-8 shadow-inner border border-blue-200">
                            闯关进度：{{ focusedTaskIndex + 1 }} / {{ tasks.length }}
                        </div>

                        <h2 class="text-3xl md:text-5xl font-extrabold text-gray-800 leading-tight mb-14 tracking-wide">
                            {{ focusedTask.text_content }}
                        </h2>

                        <div class="flex flex-col items-center gap-8 w-full">
                            <div class="flex items-center justify-center gap-4 w-full">
                                <button v-if="processingTaskId === focusedTask.id" disabled class="bg-gray-200 text-gray-500 px-8 py-4 rounded-full font-bold flex items-center gap-3 cursor-not-allowed text-xl shadow-inner">
                                    <svg class="w-7 h-7 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>格式处理中...
                                </button>
                                <button v-else-if="recordingTaskId === focusedTask.id" @click.stop="stopRecording(focusedTask.id)" class="bg-red-500 hover:bg-red-600 text-white px-10 py-5 rounded-full font-extrabold transition flex items-center gap-3 animate-pulse text-xl shadow-xl shadow-red-500/40 transform hover:scale-105">
                                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>停止录制
                                </button>
                                <button v-else @click.stop="startRecording(focusedTask.id)" class="bg-blue-500 hover:bg-blue-600 text-white px-10 py-5 rounded-full font-extrabold transition flex items-center gap-3 text-xl shadow-xl shadow-blue-500/30 transform hover:scale-105" :class="focusedTask.is_completed ? 'bg-orange-400 hover:bg-orange-500 shadow-orange-500/30' : ''">
                                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>{{ focusedTask.is_completed ? '重新挑战 (重录)' : '点击开始录音' }}
                                </button>
                            </div>
                            
                            <div v-if="focusedTask.is_completed && focusedTask.audio_path && processingTaskId !== focusedTask.id" class="mt-4 flex flex-col items-center gap-6 w-full">
                                <div class="flex items-center gap-2 text-green-600 font-bold text-xl bg-green-50 px-6 py-2.5 rounded-full border border-green-200 shadow-sm">
                                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>录制成功！
                                </div>
                                <div class="transform scale-125 md:scale-150 origin-top mt-4">
                                    <custom-audio :src="focusedTask.audio_path"></custom-audio>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button @click.stop="nextFocusTask" :disabled="focusedTaskIndex === tasks.length - 1" class="pointer-events-auto p-3 md:p-5 rounded-full bg-white/20 text-white hover:bg-white/30 disabled:opacity-0 disabled:cursor-not-allowed transition transform hover:translate-x-2 shadow-xl backdrop-blur-sm">
                        <svg class="w-8 h-8 md:w-10 md:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                    
                </div>
            </div>
        </div>
    </template>

                            <button @click="copyTranscript(item)" class="shrink-0 text-xs md:text-sm px-3 py-1.5 rounded-lg border border-blue-500/40 text-blue-100 hover:bg-blue-500/20 transition flex items-center gap-1.5 font-bold">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V5a2 2 0 012-2h7a2 2 0 012 2v7a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2M8 7h6a2 2 0 012 2v6a2 2 0 01-2 2H8a2 2 0 01-2-2V9a2 2 0 012-2z"></path>
                                </svg>
                                {{ copiedItemId === item.id ? '已复制' : '复制' }}
                            </button>
                        </div>
                    </div>
                </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 items-stretch">
                <div class="lg:col-span-3 bg-white p-5 md:p-6 rounded-[2rem] shadow-sm border border-blue-50">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-gray-400 uppercase ml-1">识别权重模型</label>
                            <select v-model="params.selected_model" class="bg-blue-50 border-none rounded-2xl px-4 py-3 font-bold text-blue-600 focus:ring-2 focus:ring-blue-400 shadow-inner w-full">
                                <option disabled value="">请选择模型</option>
                                <optgroup label="Base Models">
                                    <option v-for="baseModel in baseModelOptions" :key="baseModel" :value="baseModel">
                                        {{ baseModel }} (base)
                                    </option>
                                </optgroup>
                                <optgroup label="Finetuned Models">
                                    <option v-for="model in modelOptions" :key="model.model_name" :value="model.model_name">
                                        {{ model.model_name }} (finetuned)
                                    </option>
                                </optgroup>
                            </select>
                            <span v-if="params.selected_model"
                                  class="text-[10px] font-bold uppercase px-2 py-1 rounded-full w-fit"
                                  :class="selectedModelTag() === 'base' ? 'bg-emerald-100 text-emerald-700' : 'bg-violet-100 text-violet-700'">
                                {{ selectedModelTag() }}
                            </span>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-gray-400 uppercase ml-1">解码精度 (Beams)</label>
                            <input type="number" min="1" max="5" v-model.number="params.num_beams" class="w-full max-w-[120px] bg-gray-50 border-none rounded-2xl px-4 py-3 text-center font-bold focus:ring-2 focus:ring-blue-400">
                            <div class="text-xs text-gray-400 ml-1">值越高越精细，速度会略慢</div>
                        </div>

                        <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-3 pt-1">
                            <label class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 flex items-center gap-2 cursor-pointer font-bold text-gray-600 transition hover:border-blue-300 hover:text-blue-500">
                                <input type="checkbox" v-model="params.to_simple" class="w-5 h-5 text-blue-600 rounded-lg"> 简体中文输出
                            </label>
                            <label class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 flex items-center gap-2 cursor-pointer font-bold text-gray-600 transition hover:border-blue-300 hover:text-blue-500">
                                <input type="checkbox" v-model="params.remove_pun" class="w-5 h-5 text-blue-600 rounded-lg"> 去除标点符号
                            </label>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3">
                    <button @click="toggleRecording" :disabled="isProcessing && !isRecording" 
                            class="rounded-[1.5rem] font-extrabold transition-all duration-300 flex items-center justify-center shadow-xl gap-3 px-4 py-4"
                            :class="isRecording ? 'bg-red-500 text-white animate-pulse' : 'bg-blue-500 text-white hover:bg-blue-600'">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path v-if="!isRecording" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M12 18a5 5 0 005-5V8a5 5 0 10-10 0v5a5 5 0 005 5zm0 0v3m-4 0h8"></path>
                            <path v-else stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M6 6h12v12H6z"></path>
                        </svg>
                        <span class="text-base">{{ isRecording ? '停止识别' : '开始录音识别' }}</span>
                    </button>
                    <button @click="$refs.audioInput.click()" class="bg-white border border-blue-200 text-blue-600 py-4 rounded-[1.5rem] font-bold text-sm hover:bg-blue-50 transition shadow-sm flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 014-4h2l2-3h2l2 3h2a4 4 0 110 8H7a4 4 0 01-4-4z"></path>
                        </svg>
                        上传音频文件识别
                    </button>
                    <input type="file" ref="audioInput" accept="audio/*" class="hidden" @change="handleFileUpload">
                </div>
            </div>

            <div v-if="tempAudioPath" class="flex justify-center animate-in fade-in zoom-in duration-300">
                <div class="bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-4">
                    <span class="text-sm font-bold">刚刚录制：</span>
                    <custom-audio :src="tempAudioPath"></custom-audio>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
