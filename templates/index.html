<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音采集与微调控制台 v1.1-Release</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    <!-- 前端库本地化（同源加载，避免国内访问海外 CDN 慢/失败导致白屏）。见 TODO_PUBLIC_DEPLOY.md A-5。
         Tailwind 已由 Play CDN 改为预编译静态 CSS：改 class 后用 tailwind.config.js 里的命令重新生成。 -->
    <!-- 主题预设：在样式加载前同步定好 light/dark，避免刷新时闪一下错主题。
         data-theme 供 CSS/图表读取；.theme-light-app 只在「亮色 且 疑似已登录(有 token)」时挂，
         隐藏星空背景 + 还原浅色 body（登录页恒为星空，故未登录不挂）。之后由 app.js 接管同步。 -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('whisper_theme') === 'light' ? 'light' : 'dark';
                var el = document.documentElement;
                el.dataset.theme = t;
                if (t === 'light' && localStorage.getItem('whisper_token')) el.classList.add('theme-light-app');
            } catch (e) {}
        })();
    </script>
    <script src="/static/vendor/vue-3.5.35.global.prod.js"></script>
    <link rel="stylesheet" href="/static/vendor/tailwind.css?v=2">
    <script src="/static/vendor/echarts-5.5.0.min.js"></script>
    <style>
        /* 定义左右滑动的丝滑过场动画 */
        .slide-left-enter-active, .slide-left-leave-active,
        .slide-right-enter-active, .slide-right-leave-active {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 前进：新页面从右边滑入，老页面向左边退去 */
        .slide-left-enter-from { opacity: 0; transform: translateX(40px); }
        .slide-left-leave-to { opacity: 0; transform: translateX(-40px); }

        /* 后退：新页面从左边滑入，老页面向右边退去 */
        .slide-right-enter-from { opacity: 0; transform: translateX(-40px); }
        .slide-right-leave-to { opacity: 0; transform: translateX(40px); }

        .transcript-text {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
            letter-spacing: 0.02em;
            text-shadow: 0 0 12px rgba(59, 130, 246, 0.08);
        }

        .transcript-card {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.95), rgba(30, 41, 59, 0.96));
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.35);
        }

        /* ========================================================================
           登录界面：梵高星空涂鸦风 动态背景。详见 TODO_LOGIN_BACKGROUND.md。
           真·多图层合成：sky(纯星空底) + clouds(透明,视差横移) + foreground(透明,小人/地面,盖在云上)
           + moon(透明,原地自转)，都放进 cover-frame 共享裁剪、天然对齐；再叠 闪烁星 + 月晕呼吸 + 暗角。
           图层资产 static/img/login/{sky,clouds,foreground,moon}.webp。动效在 prefers-reduced-motion 下静止。
           ===================================================================== */

        /* L0 兜底深蓝 + 全局星空背景容器：position:fixed 铺满视口、z-index:-1 沉到所有内容之下，
           所有页面共享同一张星空。登录页=灵动版(.is-login)，登录后内页=安静版(.is-calm)。*/
        html { background: #070b22; }                       /* 终极兜底，杜绝白闪 */
        body { background: transparent; color: #e2e8f0; }
        .sky-bg {
            position: fixed; inset: 0; z-index: -1; overflow: hidden;
            background: radial-gradient(120% 85% at 50% 6%, #16204a 0%, #0b1130 48%, #070b22 100%);
            --mx: 0; --my: 0;   /* 仅登录页(.is-login)由 login_parallax.js 更新；内页恒为 0 → 无视差 */
        }
        /* 安静版（已登录内页）：调亮一点 + 冻结月/云 + 压暗蒙版；星星保留闪烁，工作时也有点灵气 */
        .sky-bg.is-calm .cover-frame  { filter: brightness(.72) saturate(.95); }
        .sky-bg.is-calm .cf-layer,
        .sky-bg.is-calm .moon,
        .sky-bg.is-calm .moon-glow    { animation: none; }      /* 月亮/云/月晕 静止 */
        .sky-bg.is-calm .moon         { transform: translate(-50%, -50%); }
        .sky-bg.is-calm .layer-clouds { transform: none; }
        .sky-bg.is-calm .moon-glow    { opacity: .55; }
        /* 星星不冻结：沿用 twinkle2 闪烁动画（reduced-motion 下仍由下方媒体查询统一关停）*/
        .sky-bg.is-calm::after {
            content: ""; position: absolute; inset: 0; z-index: 7; pointer-events: none;
            background: radial-gradient(130% 100% at 50% 28%, rgba(7,11,34,.3) 0%, rgba(4,6,18,.58) 100%);
        }

        /* cover-frame：把"按 cover 裁剪的画布"做成居中容器，sky/clouds/moon 都铺在里面，
           三层共享同一裁剪、天然对齐；月亮按画布百分比精确定位并"原地自转"。画布比 2752/1536≈1.7917 */
        .cover-frame {
            position: absolute; top: 50%; left: 50%; z-index: 0; pointer-events: none;
            width: max(100vw, calc(100vh * 1.7917));
            height: max(100vh, calc(100vw / 1.7917));
            transform: translate(-50%, -50%);
        }
        .cf-layer { position: absolute; inset: 0; background-size: 100% 100%; background-repeat: no-repeat;
            animation: layerFadeIn 1.1s ease both; }
        /* L1 天空底（已去月去云、补星空，不透明）*/
        .layer-sky    { background-image: url('/static/img/login/sky.webp?v=3'); }
        /* L2 云（透明）：横向缓移 + 轻浮动，与静止的天空形成视差 */
        .layer-clouds { background-image: url('/static/img/login/clouds.webp?v=4');
            animation: layerFadeIn 1.1s ease both, clouddrift 28s ease-in-out infinite alternate; }
        /* L2.5 前景（透明）：小人/长椅/地面，盖在云之上，静止不动 */
        .layer-fg     { background-image: url('/static/img/login/foreground.webp?v=2'); }
        /* L3 月晕（呼吸）+ 月亮（极慢自转）—— 月心在画布 50% / 19.5% */
        .moon-glow {
            position: absolute; left: 49%; top: 17.8%; width: 30%; aspect-ratio: 1;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(253,224,138,.50), rgba(251,191,36,.12) 42%, transparent 68%);
            animation: layerFadeIn 1.1s ease both, glowpulse 6s ease-in-out infinite;
        }
        .moon {
            position: absolute; left: 49%; top: 17.8%; width: 12.1%;
            transform: translate(-50%, -50%); transform-origin: 50% 50%;
            animation: layerFadeIn 1.1s ease both, moonspin 90s linear infinite;
        }

        /* P4 极轻视差：各层按"深度"用 translate 偏移几像素（与上面的 transform 动画叠加；
           前景 .layer-fg 不参与，像脚下的地面一样稳住）。变量为 0 时无偏移，故 reduced-motion 安全 */
        .layer-sky        { translate: calc(var(--mx) * -9px)  calc(var(--my) * -9px); }
        .layer-clouds     { translate: calc(var(--mx) * -24px) calc(var(--my) * -15px); }
        .moon, .moon-glow { translate: calc(var(--mx) * -14px) calc(var(--my) * -14px); }
        .layer-stars      { translate: calc(var(--mx) * -11px) calc(var(--my) * -11px); }

        /* L4 叠加发光闪烁星：~100 颗，随机大小/相位，透明度+微缩放 闪烁（screen 混合融入底图）*/
        .layer-stars { position: absolute; inset: 0; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        .layer-stars .tw {
            position: absolute; width: var(--sz, 5px); height: var(--sz, 5px);
            margin: calc(var(--sz, 5px) / -2); border-radius: 50%;
            background: radial-gradient(circle, #fff7d6 0%, #fcd34d 45%, transparent 72%);
            filter: drop-shadow(0 0 4px rgba(253,224,138,.85));
            animation: twinkle2 var(--d, 3.6s) ease-in-out infinite;
        }
        .layer-stars .tw.cool {
            background: radial-gradient(circle, #e0f2fe 0%, #7dd3fc 45%, transparent 72%);
            filter: drop-shadow(0 0 4px rgba(125,211,252,.8));
        }
        /* L6 氛围层：四周暗角，把视觉收拢到中部卡片（恒定，不脉动）*/
        .layer-atmos {
            position: absolute; inset: 0; z-index: 6; pointer-events: none;
            background: radial-gradient(150% 125% at 50% 40%, transparent 50%, rgba(4,6,18,.62) 100%);
        }

        @keyframes layerFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes clouddrift  { from { transform: scale(1.08) translateX(-1.3%); } to { transform: scale(1.08) translateX(1.3%); } }
        @keyframes moonspin    { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
        @keyframes glowpulse   { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
        @keyframes twinkle2    { 0%,100% { opacity: .25; transform: scale(.7); } 50% { opacity: 1; transform: scale(1.2); } }

        /* —— 深色玻璃登录卡片（夜空主题）+ 入场动效 —— */
        .login-card {
            position: relative; z-index: 10;
            background: rgba(15, 23, 42, .38);          /* 毛玻璃磨砂 + 较高透明度：质感在但更通透 */
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            border: 1px solid rgba(253, 224, 138, .26);
            box-shadow: 0 30px 70px -20px rgba(0, 0, 0, .55), inset 0 1px 0 rgba(255, 255, 255, .08);
            animation: cardIn .55s cubic-bezier(.16,1,.3,1) both;
        }
        /* 文字阴影，磨砂上更清晰 */
        .login-card h2 { color: #f8fafc; text-shadow: 0 1px 10px rgba(0, 0, 0, .5); }
        .login-card p  { color: #e2e8f0; text-shadow: 0 1px 8px rgba(0, 0, 0, .45); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(18px) scale(.97); } to { opacity: 1; transform: none; } }

        /* —— 麦克风徽章 + "正在聆听"涟漪 —— */
        .mic-badge {
            position: relative; width: 84px; height: 84px; margin: 0 auto 1.25rem;
            border-radius: 9999px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 30px -6px rgba(251,191,36,.55);
        }
        .mic-badge svg { width: 40px; height: 40px; color: #422006; position: relative; z-index: 1; }
        .mic-badge .ripple {
            position: absolute; inset: 0; border-radius: 9999px;
            border: 2px solid rgba(251,191,36,.5);
            animation: listen 3s ease-out infinite;
        }
        .mic-badge .ripple:nth-child(2) { animation-delay: 1s; }
        .mic-badge .ripple:nth-child(3) { animation-delay: 2s; }
        @keyframes listen { 0% { transform: scale(1); opacity: .7; } 100% { transform: scale(2.2); opacity: 0; } }

        /* —— 深色输入框（聚焦时暖黄描边 + 图标点亮）—— */
        .login-field { position: relative; }
        .login-field > svg {
            position: absolute; left: 1.05rem; top: 50%; transform: translateY(-50%);
            width: 22px; height: 22px; color: rgba(226,232,240,.5); pointer-events: none; z-index: 1;
            transition: color .2s;
        }
        .login-input {
            padding-left: 3rem; text-align: left;
            background: transparent;                       /* 透明：只留描边，露出卡片 */
            border: 2px solid rgba(255,255,255,.22);
            color: #f1f5f9;
        }
        .login-input::placeholder { color: rgba(226,232,240,.45); }
        .login-input:focus {
            outline: none;
            border-color: rgba(251,191,36,.85);
            background: rgba(255,255,255,.04);             /* 聚焦时极淡填充，仅作反馈 */
            box-shadow: 0 0 0 4px rgba(251,191,36,.12);
        }
        .login-field:focus-within > svg { color: #fbbf24; }

        /* —— 主按钮：暖金渐变（深底上对比最高的 CTA），深色文字 —— */
        .login-btn-primary { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #422006; box-shadow: 0 12px 26px -8px rgba(251,191,36,.5); }
        .login-btn-primary:hover { filter: brightness(1.06); }
        /* —— 次按钮：深色幽灵态 —— */
        .login-btn-ghost { background: rgba(255,255,255,.06); color: #fde68a; border: 2px solid rgba(253,224,138,.28); }
        .login-btn-ghost:hover { background: rgba(255,255,255,.12); }

        /* —— 尊重"减少动态"偏好：关掉所有登录动效，定格为静态美图 —— */
        @media (prefers-reduced-motion: reduce) {
            .cf-layer,
            .moon, .moon-glow,
            .layer-stars i,
            .login-card,
            .mic-badge .ripple { animation: none !important; }
        }

        /* ========================================================================
           已登录内页：把原亮色 UI 重皮成「梵高星空」深蓝磨砂玻璃风（深蓝冷 + 暖黄）。
           约束：Tailwind 已预编译并按需裁剪，不能新增工具类；故用更高优先级的 .vg-app
           作用域选择器覆盖既有工具类的“颜色”，不动结构/布局。只改色，可整段删除以回滚。
           ===================================================================== */
        .vg-app { color: #e2e8f0; }                          /* 未显式着色的文本兜底为浅色 */

        /* —— 卡片：白底 → 深蓝磨砂玻璃 —— */
        .vg-app .bg-white {
            background: rgba(17, 24, 39, .5);
            backdrop-filter: blur(14px) saturate(130%);
            -webkit-backdrop-filter: blur(14px) saturate(130%);
            box-shadow: 0 20px 50px -24px rgba(0, 0, 0, .7), inset 0 1px 0 rgba(255, 255, 255, .06);
        }
        .vg-app .bg-white\/90,
        .vg-app .bg-white\/80,
        .vg-app .bg-white\/70 {
            background: rgba(17, 24, 39, .6);
            backdrop-filter: blur(16px) saturate(130%);
            -webkit-backdrop-filter: blur(16px) saturate(130%);
        }
        /* —— 次级面板（淡蓝/淡灰底）→ 半透明深色（已浮在磨砂卡上，不再叠模糊）—— */
        .vg-app .bg-blue-50,
        .vg-app .bg-blue-50\/40,
        .vg-app .bg-blue-50\/50,
        .vg-app .bg-blue-50\/60,
        .vg-app .bg-blue-50\/80   { background: rgba(30, 41, 59, .42); }
        .vg-app .bg-indigo-50\/60 { background: rgba(43, 45, 84, .42); }
        .vg-app .bg-blue-100      { background: rgba(56, 89, 168, .32); }
        .vg-app .bg-gray-50,
        .vg-app .bg-gray-50\/50,
        .vg-app .bg-gray-50\/60,
        .vg-app .bg-gray-100      { background: rgba(2, 6, 23, .35); }
        .vg-app .bg-gray-200,
        .vg-app .bg-gray-200\/80  { background: rgba(148, 163, 184, .22); }   /* 进度条/滑轨底 */

        /* —— 状态色底（徽章）：淡色 → 深色同色调（文字另调亮）—— */
        .vg-app .bg-emerald-50,
        .vg-app .bg-green-50,
        .vg-app .bg-green-50\/40,
        .vg-app .bg-green-50\/50,
        .vg-app .bg-green-100,
        .vg-app .bg-green-100\/80 { background: rgba(16, 185, 129, .16); }
        .vg-app .bg-amber-50      { background: rgba(245, 158, 11, .16); }
        .vg-app .bg-orange-50     { background: rgba(249, 115, 22, .16); }
        .vg-app .bg-red-50,
        .vg-app .bg-red-50\/50,
        .vg-app .bg-rose-50       { background: rgba(244, 63, 94, .16); }
        .vg-app .bg-sky-50        { background: rgba(56, 189, 248, .16); }

        /* —— 边框：浅灰/白 → 极淡冷光描边 —— */
        .vg-app .border-white,
        .vg-app .border-white\/40,
        .vg-app .border-white\/60,
        .vg-app .border-blue-50,
        .vg-app .border-blue-100,
        .vg-app .border-blue-100\/50,
        .vg-app .border-gray-100,
        .vg-app .border-gray-200,
        .vg-app .border-gray-300,
        .vg-app .border-indigo-100 { border-color: rgba(148, 163, 184, .18); }

        /* —— 文字：深灰阶 → 浅色阶 —— */
        .vg-app .text-gray-800,
        .vg-app .text-gray-700 { color: #f1f5f9; }
        .vg-app .text-gray-600 { color: #cbd5e1; }
        .vg-app .text-gray-500 { color: #aab4c5; }
        .vg-app .text-gray-400 { color: #8b97ab; }
        /* 主强调：蓝字 → 暖金（与登录页一致的星光金）*/
        .vg-app .text-blue-600,
        .vg-app .text-blue-500 { color: #fcd34d; }
        .vg-app .text-blue-700 { color: #fde68a; }
        .vg-app .hover\:text-blue-500:hover,
        .vg-app .hover\:text-blue-600:hover,
        .vg-app .group:hover .group-hover\:text-blue-500 { color: #fde68a; }
        /* 语义文字调亮，确保在深底上够亮 */
        .vg-app .text-emerald-700,
        .vg-app .text-green-700,
        .vg-app .text-green-600 { color: #6ee7b7; }
        .vg-app .text-red-700,
        .vg-app .text-red-600,
        .vg-app .text-red-500,
        .vg-app .text-red-400,
        .vg-app .text-rose-700,
        .vg-app .text-rose-500 { color: #fda4af; }
        .vg-app .text-amber-700,
        .vg-app .text-orange-500 { color: #fbbf24; }
        .vg-app .text-sky-700,
        .vg-app .text-sky-600 { color: #7dd3fc; }
        .vg-app .text-violet-700 { color: #c4b5fd; }

        /* —— 表单控件：深底浅字 + 暖金聚焦（沿用登录页观感）—— */
        .vg-app input,
        .vg-app select,
        .vg-app textarea { color: #f1f5f9; }
        .vg-app input::placeholder,
        .vg-app textarea::placeholder { color: rgba(226, 232, 240, .4); }
        /* 没有 bg-* 工具类的输入框（如各滑块右侧的数字框）兜底成深色，避免浅底浅字看不见。
           用 :where() 保持 0 特异度 → 任何显式 bg-* 工具类仍能照常覆盖它 */
        .vg-app :where(input[type="text"], input[type="number"], input[type="password"], select, textarea) {
            background-color: rgba(2, 6, 23, .4);
        }
        /* 个别用 bg-white 的输入/下拉：去掉卡片级模糊与重投影，回归朴素深色控件 */
        .vg-app input.bg-white,
        .vg-app select.bg-white { backdrop-filter: none; -webkit-backdrop-filter: none; box-shadow: none; }
        .vg-app .focus\:bg-white:focus { background: rgba(2, 6, 23, .5); }
        /* 导入(.txt) 文件按钮 + 基础模型“下载”按钮的浅色面 → 深色面 */
        .vg-app .file\:bg-blue-50::file-selector-button { background: rgba(30, 41, 59, .55); }
        .vg-app .file\:text-blue-600::file-selector-button { color: #fde68a; }
        .vg-app .from-white { --tw-gradient-from: #1e293b var(--tw-gradient-from-position); --tw-gradient-to: rgb(30 41 59 / 0) var(--tw-gradient-to-position); --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
        .vg-app .to-sky-50  { --tw-gradient-to: #0b1220 var(--tw-gradient-to-position); }

        /* —— 禁用态：浅灰 → 暗哑灰，避免在深底上反而高亮 —— */
        .vg-app .disabled\:bg-gray-300:disabled,
        .vg-app .disabled\:bg-gray-100:disabled { background: rgba(148, 163, 184, .18); }
        .vg-app .disabled\:text-gray-400:disabled { color: #64748b; }
        .vg-app .disabled\:border-gray-200:disabled { border-color: rgba(148, 163, 184, .18); }
        .vg-app .disabled\:from-gray-300:disabled { --tw-gradient-from: #334155 var(--tw-gradient-from-position); --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to); }
        .vg-app .disabled\:to-gray-400:disabled { --tw-gradient-to: #475569 var(--tw-gradient-to-position); }

        /* —— 深色滚动条（识别文本流等）—— */
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: rgba(148, 163, 184, .4) transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, .35); border-radius: 9999px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

        /* —— 识别文本流：底部边缘拖动调节高度（句柄 + 抓握条）—— */
        .transcript-resizer {
            height: 14px; margin-top: 2px;
            display: flex; align-items: center; justify-content: center;
            cursor: ns-resize; touch-action: none; user-select: none;
        }
        .transcript-resizer .grip {
            height: 4px; width: 44px; border-radius: 9999px;
            background: rgba(148, 163, 184, .35);
            transition: background .15s ease, width .15s ease;
        }
        .transcript-resizer:hover .grip { background: rgba(96, 165, 250, .8); width: 60px; }
        .transcript-resizer.is-dragging .grip { background: rgba(96, 165, 250, 1); width: 64px; }

        /* ========================================================================
           主题切换：light / dark。dark = 星空（`.sky-bg` 背景 + `.vg-app` 深色皮）；
           light = 去掉 `.vg-app`（回原生 Tailwind 亮色）+ 藏星空 + 还原浅蓝 body。
           开关与扩散动画见 app.js 的 toggleTheme（View Transitions API）。
           ===================================================================== */
        /* 亮色 且 已登录：藏掉星空背景、还原原来的浅蓝底与深色文字（登录页恒星空，故不挂此类）*/
        html.theme-light-app .sky-bg { display: none; }
        html.theme-light-app body { background: #eff6ff; color: #1f2937; }   /* = 原 bg-blue-50 / text-gray-800 */

        /* —— 右下角主题切换 FAB（圆形磨砂玻璃 + 暖色光晕）—— */
        .theme-fab {
            position: fixed; right: 22px; bottom: 92px; z-index: 60;   /* 移动端抬高，避开底部居中的 tab 栏 */
            width: 52px; height: 52px; border-radius: 9999px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid transparent;
            transition: transform .2s ease, box-shadow .25s ease, background .3s ease, border-color .3s ease, color .3s ease;
        }
        @media (min-width: 1024px) { .theme-fab { bottom: 26px; } }       /* 宽屏右侧空间足够，落到角落 */
        .theme-fab svg { width: 24px; height: 24px; }
        .theme-fab:hover  { transform: translateY(-2px) scale(1.05); }
        .theme-fab:active { transform: scale(.94); }
        .theme-fab:focus-visible { outline: 2px solid rgba(251, 191, 36, .7); outline-offset: 2px; }
        /* dark：深蓝玻璃 + 暖金月亮 */
        html[data-theme="dark"] .theme-fab {
            background: rgba(15, 23, 42, .55); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-color: rgba(253, 224, 138, .35); color: #fcd34d;
            box-shadow: 0 10px 26px -10px rgba(0, 0, 0, .6), 0 0 18px -4px rgba(251, 191, 36, .35);
        }
        html[data-theme="dark"] .theme-fab:hover { box-shadow: 0 14px 32px -8px rgba(0, 0, 0, .6), 0 0 28px -2px rgba(251, 191, 36, .55); }
        /* light：白玻璃 + 暖橙太阳 */
        html[data-theme="light"] .theme-fab {
            background: rgba(255, 255, 255, .88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-color: rgba(59, 130, 246, .18); color: #f59e0b;

        }
        html[data-theme="light"] .theme-fab:hover { box-shadow: 0 16px 34px -10px rgba(2, 6, 23, .32), 0 0 22px -6px rgba(245, 158, 11, .5); }

        ::view-transition-old(root), ::view-transition-new(root) { animation: none; mix-blend-mode: normal; }
        ::view-transition-new(root) { z-index: 1; }   /* 新主题在上、被圆形 clip 揭开 */
        ::view-transition-old(root) { z-index: 0; }

        <!-- 放在 #app 顶层、登录遮罩之外，z-index 最高，登录界面也能正常弹出 -->
        <transition

            enter-from-class="opacity-0"

                                 'bg-yellow-500': dialogState.variant === 'warning',
                                 'bg-red-500':    dialogState.variant === 'danger'
                             }"></div>

                                         'bg-yellow-100': dialogState.variant === 'warning',
                                         'bg-red-100':    dialogState.variant === 'danger'
                                     }">
                                    <span v-if="dialogState.variant === 'info'">💡</span>

                </p>
                <p v-if="selectedModelName && !isTraining" class="text-sm font-bold text-gray-500 mb-3">
                    正在查看模型 <span class="text-blue-600">「{{ selectedModelName }}」</span> 的训练曲线
                </p>
                <div class="relative h-80 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 overflow-hidden">
                    <div ref="chartRef" class="w-full h-full absolute inset-0 z-10 transition-opacity duration-500" :class="{ 'opacity-0': !hasChartData, 'opacity-100': hasChartData }"></div>

                    <div v-if="chartError" class="absolute inset-0 flex flex-col items-center justify-center text-red-400 z-20 bg-white/80 backdrop-blur-sm">
                        <span class="text-3xl mb-2">⚠️</span>
                        <p class="font-bold text-sm">{{ chartError }}</p>
                        <p class="text-xs text-gray-500 mt-2">可先继续训练，刷新后会自动重连并重新绘制。</p>
                    </div>

                    <div v-else-if="!hasChartData" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 z-0">
                        <span class="text-3xl mb-2">📈</span>
                        <p class="font-bold text-sm">训练集 Loss + 验证集 Eval Loss 将在这里实时呈现</p>
                        <div class="mt-3 flex items-center gap-4 text-xs font-bold">
                            <span class="inline-flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-500"></span>训练集 Loss</span>
                            <span class="inline-flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-500"></span>验证集 Eval Loss</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- --- 管理微调好的模型 --- -->
            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-blue-50 transition hover:shadow-md">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">📦</span>
                        <h3 class="text-xl font-extrabold text-gray-800">管理微调好的模型</h3>
                    </div>
                    <button @click="loadUserModels" :disabled="isLoadingModels"
                            class="inline-flex items-center gap-1.5 text-sm font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 disabled:opacity-50 px-3 py-1.5 rounded-full transition">
                        <svg class="w-4 h-4" :class="{ 'animate-spin': isLoadingModels }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        刷新
                    </button>
                </div>

                <!-- 模型列表 -->
                <div v-if="userModels.length" class="space-y-3">
                    <div v-for="model in userModels" :key="model.model_name"
                         class="flex flex-col sm:flex-row sm:items-center gap-3 p-4 rounded-2xl border transition"
                         :class="selectedModelName === model.model_name ? 'border-blue-300 bg-blue-50/60 shadow-sm' : 'border-gray-100 bg-gray-50/60 hover:border-blue-100'">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="font-extrabold text-gray-800 truncate">{{ model.model_name }}</span>
                                <span v-if="model.is_published" class="inline-flex items-center px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100 text-[11px] font-bold">已发布</span>
                                <span v-if="model.has_tflite" class="inline-flex items-center px-2 py-0.5 rounded-full bg-sky-50 text-sky-700 border border-sky-100 text-[11px] font-bold">TFLite</span>
                                <span v-if="model.has_ggml" class="inline-flex items-center px-2 py-0.5 rounded-full bg-violet-50 text-violet-700 border border-violet-100 text-[11px] font-bold">ggml</span>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">训练完成时间：{{ formatTime(model.updated_at) || '未知' }}</p>
                            <p v-if="exportError(model.model_name)" class="text-[11px] text-rose-500 mt-1">导出失败：{{ exportError(model.model_name) }}</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-2 sm:justify-end">
                            <button @click="exportModel(model, 'ggml')" :disabled="isTraining || isExporting(model.model_name,'ggml')"
                                    :title="model.has_ggml ? '已有 ggml，点可重新生成' : '生成 ggml（浏览器本地推理用）'"
                                    class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold transition disabled:opacity-50 disabled:cursor-not-allowed bg-white border"
                                    :class="model.has_ggml ? 'text-violet-600 border-violet-200 hover:bg-violet-50' : 'text-gray-600 border-gray-200 hover:bg-gray-50'">
                                <svg v-if="isExporting(model.model_name,'ggml')" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                {{ isExporting(model.model_name,'ggml') ? '导出中…' : (model.has_ggml ? '重导 ggml' : '导出 ggml') }}
                            </button>
                            <button @click="exportModel(model, 'tflite')" :disabled="isTraining || isExporting(model.model_name,'tflite')"
                                    :title="model.has_tflite ? '已有 TFLite，点可重新生成' : '生成 TFLite（安卓端 / 发布用）'"
                                    class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold transition disabled:opacity-50 disabled:cursor-not-allowed bg-white border"
                                    :class="model.has_tflite ? 'text-sky-600 border-sky-200 hover:bg-sky-50' : 'text-gray-600 border-gray-200 hover:bg-gray-50'">
                                <svg v-if="isExporting(model.model_name,'tflite')" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                {{ isExporting(model.model_name,'tflite') ? '导出中…' : (model.has_tflite ? '重导 TFLite' : '导出 TFLite') }}
                            </button>
                            <button @click="publishExistingModel(model)" :disabled="!model.has_tflite || publishingModel===model.model_name || isTraining"
                                    :title="!model.has_tflite ? '需先导出 TFLite 才能发布' : '发布到 ModelScope（安卓端同步更新）'"
                                    class="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    :class="model.is_published ? 'bg-emerald-500 text-white hover:bg-emerald-600' : 'bg-white text-emerald-600 border border-emerald-200 hover:bg-emerald-50'">
                                <svg v-if="publishingModel===model.model_name" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                {{ publishingModel===model.model_name ? '发布中…' : (model.is_published ? '重新发布' : '发布') }}
                            </button>
                            <button @click="viewModelCurve(model)"
                                    :disabled="isTraining"
                                    :title="isTraining ? '训练进行中，暂时无法切换查看其它模型' : '在上方看板回放该模型的训练曲线'"
                                    class="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    :class="selectedModelName === model.model_name ? 'bg-blue-500 text-white shadow-sm' : 'bg-white text-blue-600 border border-blue-200 hover:bg-blue-50'">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3v18h18M7 14l3-3 3 3 5-6"></path></svg>
                                查看曲线
                            </button>
                            <button @click="handleDeleteModel(model)"
                                    :disabled="isTraining || deletingModel === model.model_name"
                                    :title="isTraining ? '训练进行中，暂时无法删除' : '删除该模型（不可恢复）'"
                                    class="inline-flex items-center justify-center w-10 h-10 rounded-xl text-rose-500 bg-white border border-rose-200 hover:bg-rose-50 disabled:opacity-50 disabled:cursor-not-allowed transition">
                                <svg v-if="deletingModel === model.model_name" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                <svg v-else class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 空态 -->
                <div v-else class="flex flex-col items-center justify-center py-10 text-gray-400">
                    <span class="text-3xl mb-2">🗂️</span>
                    <p class="font-bold text-sm">还没有微调好的模型</p>
                    <p class="text-xs mt-1">完成上方一次微调训练后，模型会出现在这里。</p>
                </div>
            </div>

            <!-- --- 新增：发布模型确认弹窗 --- -->
            <div v-if="showPublishModal" class="fixed inset-0 z-[100] flex items-center justify-center">
                <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" @click="closePublishModal"></div>
                <div class="relative z-10 w-full max-w-md mx-4 bg-white rounded-[2.5rem] shadow-2xl p-8 md:p-10 border border-blue-50 text-center transform transition-all scale-100 animate-in zoom-in duration-300">
                    <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h3 class="text-2xl font-extrabold text-gray-800 mb-3">微调训练已完成！</h3>
                    <p class="text-gray-500 mb-8 leading-relaxed text-sm">
                        模型 <span class="text-blue-600 font-bold">"{{ lastTrainedModelName }}"</span> 及其 TFLite 版本已准备就绪。是否立即将其发布为正式版？发布后，手机端将能同步更新。
                    </p>
                    <div class="flex flex-col gap-3">
                        <button @click="handlePublishModel" :disabled="isPublishing" class="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 text-white font-extrabold text-lg py-4 rounded-2xl shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-2">
                            <svg v-if="isPublishing" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            {{ isPublishing ? '正在发布...' : '🚀 立即发布' }}
                        </button>
                        <button @click="closePublishModal" class="w-full bg-white text-gray-400 border border-gray-100 hover:bg-gray-50 font-bold py-3 rounded-2xl transition">以后再说</button>
                    </div>
                </div>
            </div>

        </div>
    </template>

    <template id="tpl-custom-audio">
        <div class="flex items-center gap-2 bg-blue-50/80 px-3 py-1.5 rounded-full border border-blue-100/50 w-40 sm:w-48 shadow-inner transition hover:bg-blue-100/80" @click.stop>
            <audio ref="audioEl" :src="src" @timeupdate="onTimeUpdate" @loadedmetadata="onLoaded" @ended="onEnded" @play="onPlay" preload="metadata"></audio>
            <button @click="togglePlay" class="text-blue-500 hover:text-blue-600 focus:outline-none flex-shrink-0 transition transform hover:scale-110">
                <svg v-if="!isPlaying" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                <svg v-else class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            </button>
            <div class="flex-1 h-1.5 bg-gray-200 rounded-full cursor-pointer relative" @click="seek">
                <div class="absolute top-0 left-0 h-full bg-blue-400 rounded-full pointer-events-none transition-all duration-75" :style="{ width: progress + '%' }"></div>
            </div>
            <div class="text-[10px] text-gray-500 font-bold w-6 text-right flex-shrink-0 tabular-nums">{{ Math.ceil(duration || 0) }}s</div>
        </div>
    </template>

    <template id="tpl-inference-panel">
        <div class="max-w-[1500px] mx-auto space-y-6 pb-16">
            <div class="bg-white px-6 py-4 rounded-3xl shadow-sm border border-blue-50 text-center relative overflow-hidden">
                <div class="absolute -right-10 -top-10 w-32 h-32 bg-blue-50 rounded-full opacity-50"></div>
                <h2 class="text-xl md:text-2xl font-extrabold text-gray-800 relative z-10 flex flex-wrap items-center justify-center gap-x-2 gap-y-0.5">
                    ✨ 正在见证 <span class="text-blue-600">[{{ currentUser }}]</span> 的声音奇迹
                    <span class="hidden md:inline text-gray-400 font-medium text-sm">· AI 会优先使用您的专属模型</span>
                </h2>
            </div>

            <div class="bg-gray-900 rounded-3xl shadow-2xl border border-gray-800/80 p-4 md:p-6 relative flex flex-col min-h-[420px] max-h-[80vh] transition-all">
                <div class="flex items-center justify-between mb-4 border-b border-gray-800 pb-3">
                    <div class="flex gap-2.5">
                        <div class="w-3.5 h-3.5 rounded-full bg-red-500 shadow-lg shadow-red-500/20"></div>
                        <div class="w-3.5 h-3.5 rounded-full bg-yellow-500 shadow-lg shadow-yellow-500/20"></div>
                        <div class="w-3.5 h-3.5 rounded-full bg-green-500 shadow-lg shadow-green-500/20"></div>
                    </div>
                    <div class="px-4 py-1 bg-gray-800 rounded-full text-[10px] text-blue-400 font-mono tracking-widest uppercase">
                        {{ usedModelType || 'Ready' }}
                    </div>
                </div>

                <div class="mb-4 rounded-2xl border border-blue-900/60 bg-blue-950/50 px-4 py-2.5 min-h-[48px] flex items-center">
                    <span class="text-xs md:text-sm font-mono truncate"
                          :class="statusType === 'error' ? 'text-red-300' : 'text-blue-300'">
                        {{ currentStatus || '等待输入音频...' }}
                    </span>
                    <span v-if="isProcessing" class="inline-block w-2 h-5 bg-blue-400 animate-pulse align-middle ml-2 rounded-sm shadow-lg shadow-blue-500/40"></span>
                    <span v-if="isProcessing && processingElapsed" class="text-[11px] text-blue-400/70 font-mono ml-2 flex-shrink-0">{{ processingElapsed }}s</span>
                </div>

                <!-- 本地识别失败回退横幅（P3-4）：不白屏、不只 console，引导切服务端 -->
                <div v-if="localError" class="mb-4 rounded-2xl border border-red-900/60 bg-red-950/40 px-4 py-3 flex flex-col sm:flex-row sm:items-center gap-3">
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-bold text-red-300">本地识别未能完成</div>
                        <div class="text-[11px] text-red-400/80 mt-0.5">
                            {{ localSupported ? '可以重试本地，或改用服务端 GPU（更稳定）。音频无需重录。' : '本地运行时已崩溃（可能内存不足）。请改用服务端，或刷新页面后再试本地。' }}
                        </div>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button v-if="localSupported" @click="retryLocal" :disabled="isProcessing"
                                class="text-xs font-bold px-3 py-2 rounded-xl border border-red-500/40 text-red-100 hover:bg-red-500/20 transition disabled:opacity-50 disabled:cursor-not-allowed">↻ 重试本地</button>
                        <button @click="fallbackToServer" :disabled="isProcessing"
                                class="text-xs font-bold px-4 py-2 rounded-xl bg-blue-500 text-white hover:bg-blue-600 transition disabled:opacity-50 disabled:cursor-not-allowed">☁ 改用服务端</button>
                        <button @click="dismissFallback" :disabled="isProcessing" title="关闭"
                                class="text-xs font-bold px-2.5 py-2 rounded-xl text-red-300/70 hover:bg-red-500/10 transition disabled:opacity-50">✕</button>
                    </div>
                </div>

                <div class="rounded-2xl bg-gray-950/60 px-3 py-2.5 md:px-3.5 md:py-3">
                    <div class="text-[10px] md:text-[11px] text-gray-400 font-semibold tracking-wide mb-2 pl-1">识别文本流（自动滚动）</div>
                    <div ref="historyContainer" :style="{ height: panelHeight + 'px' }" class="overflow-y-auto pr-1 md:pr-2 custom-scrollbar space-y-2">
                    <div v-if="transcriptItems.length === 0" class="text-gray-500 text-sm text-center py-12">
                        识别结果会显示在这里，支持滚动查看历史记录。
                    </div>

                    <div v-for="item in transcriptItems" :key="item.id" class="transcript-card rounded-xl border border-blue-900/50 px-3 py-2.5 transition hover:border-blue-700/60">
                        <div class="flex items-start gap-2.5">
                            <div class="flex-1 min-w-0">
                                <div class="text-[10px] text-blue-300/80 font-mono mb-0.5">
                                    [{{ item.start.toFixed(1) }}s - {{ item.end.toFixed(1) }}s]
                                </div>
                                <p class="transcript-text text-base md:text-lg text-gray-50 leading-snug break-words font-semibold">{{ item.text }}</p>
                            </div>
                            <button @click="copyTranscript(item)" class="shrink-0 text-xs md:text-sm px-3 py-1.5 rounded-lg border border-blue-500/40 text-blue-100 hover:bg-blue-500/20 transition flex items-center gap-1.5 font-bold">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V5a2 2 0 012-2h7a2 2 0 012 2v7a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2M8 7h6a2 2 0 012 2v6a2 2 0 01-2 2H8a2 2 0 01-2-2V9a2 2 0 012-2z"></path>
                                </svg>
                                {{ copiedItemId === item.id ? '已复制' : '复制' }}
                            </button>
                        </div>
                    </div>
                </div>
                    <!-- 底部边缘拖动手柄：调节识别文本流显示高度 -->
                    <div class="transcript-resizer" :class="{ 'is-dragging': resizing }"
                         @pointerdown="startResize" title="拖动调节显示高度">
                        <div class="grip"></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 items-stretch">
                <div class="lg:col-span-3 bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-blue-50 space-y-4">
                    <!-- 推理方式：本地 WASM / 服务端 GPU -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">推理方式</label>
                        <div class="flex bg-blue-50 p-1 rounded-2xl border border-blue-100">
                            <button @click="setMode('local')" :disabled="!localSupported"
                                    :title="localSupported ? '在你的浏览器本地识别，音频不上传服务器' : localUnsupportedReason"
                                    class="flex-1 py-2.5 rounded-xl font-extrabold text-sm transition flex items-center justify-center gap-1.5"
                                    :class="[mode==='local' ? 'bg-blue-500 text-white shadow' : 'text-gray-500 hover:text-blue-500', !localSupported ? 'opacity-40 cursor-not-allowed' : '']">
                                ⚡ 本地浏览器
                            </button>
                            <button @click="setMode('server')"
                                    class="flex-1 py-2.5 rounded-xl font-extrabold text-sm transition flex items-center justify-center gap-1.5"
                                    :class="mode==='server' ? 'bg-blue-500 text-white shadow' : 'text-gray-500 hover:text-blue-500'">
                                ☁ 服务端 GPU
                            </button>
                        </div>
                        <div v-if="!localSupported" class="text-[11px] text-amber-600 ml-1">⚠ {{ localUnsupportedReason }}，已用服务端</div>
                    </div>

                    <!-- 模型选择 -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">识别权重模型</label>
                        <div class="relative w-full">
                            <select v-model="selectedModel" class="appearance-none bg-blue-50 border border-blue-100 rounded-2xl px-4 py-3 pr-10 font-bold text-blue-600 focus:ring-2 focus:ring-blue-400 shadow-inner w-full">
                                <option disabled value="">请选择模型</option>
                                <option v-for="b in baseModelOptions" :key="`base-${b}`" :value="b">
                                    {{ b }} (base){{ mode==='local' && !hasLocal(b) ? ' · 无本地版' : '' }}
                                </option>
                                <option v-for="m in userModels" :key="`ft-${m.model_name}`" :value="m.model_name">
                                    {{ m.is_published ? '⭐ ' : '' }}{{ m.model_name }} (finetuned){{ mode==='local' && !hasLocal(m.model_name) ? ' · 无本地版' : '' }}
                                </option>
                            </select>
                            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-blue-500 text-xs">▼</span>
                        </div>
                        <span v-if="selectedModel" class="text-[10px] font-bold uppercase px-2 py-1 rounded-full w-fit"
                              :class="selectedModelTag() === 'base' ? 'bg-emerald-100 text-emerald-700' : 'bg-violet-100 text-violet-700'">
                            {{ selectedModelTag() }}
                        </span>
                    </div>

                    <!-- 本地模型卡片（仅本地模式）-->
                    <div v-if="mode==='local'" class="rounded-2xl border-2 border-dashed px-4 py-3"
                         :class="localState==='ready' ? 'border-emerald-200 bg-emerald-50/40' : (localState==='unavailable' ? 'border-amber-200 bg-amber-50/40' : 'border-blue-200 bg-blue-50/40')">
                        <template v-if="localState==='unavailable'">
                            <div class="text-sm font-bold text-amber-700">该模型没有本地版本</div>
                            <div class="text-[11px] text-amber-600 mt-0.5">请切到「服务端 GPU」，或换一个有本地版的模型（基座 tiny/base/small，或你已发布⭐的模型）。</div>
                        </template>
                        <template v-else>
                            <div class="flex items-center justify-between gap-2">
                                <div class="min-w-0">
                                    <div class="text-sm font-bold text-gray-700 truncate">
                                        {{ selectedModel }}
                                        <span v-if="cardInfo && cardInfo.sizeMB" class="text-gray-400 font-medium">· {{ cardInfo.sizeMB }}MB</span>
                                    </div>
                                    <div class="text-[11px] mt-0.5" :class="localState==='ready' ? 'text-emerald-600' : 'text-blue-600'">
                                        <span v-if="localState==='ready'">⚡ 已缓存 · 可离线</span>
                                        <span v-else-if="localState==='loading'">⏳ 加载到内存中…</span>
                                        <span v-else-if="localState==='downloading'">⬇ 下载中 {{ downloadPct }}%（{{ downloadRecvMB }}MB）</span>
                                        <span v-else>⬇ 首次使用需下载到浏览器</span>
                                    </div>
                                </div>
                                <button v-if="localState==='need-download'" @click="downloadModel"
                                        class="shrink-0 bg-blue-500 text-white text-xs font-bold px-4 py-2 rounded-xl hover:bg-blue-600 transition">下载模型</button>
                                <button v-else-if="localState==='ready'" @click="redownloadModel"
                                        class="shrink-0 border border-gray-200 text-gray-500 text-xs font-bold px-3 py-2 rounded-xl hover:bg-gray-50 transition">重新下载</button>
                            </div>
                            <div v-if="localState==='downloading'" class="mt-2 h-2 bg-blue-100 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 transition-all duration-200" :style="{ width: downloadPct + '%' }"></div>
                            </div>
                            <!-- 移动端大模型内存提醒（P3-3）-->
                            <div v-if="mobileMemWarn && localState!=='downloading'" class="mt-2 text-[11px] text-amber-600 leading-snug">
                                📱 手机内存有限，该模型较大、加载可能失败，建议改用 tiny。
                            </div>
                        </template>
                    </div>
                </div>

                <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3">
                    <button @click="toggleRecording" :disabled="!canCapture && !isRecording"
                            class="rounded-2xl font-extrabold transition-all duration-300 flex items-center justify-center shadow-xl gap-3 px-4 py-5 disabled:opacity-50 disabled:cursor-not-allowed"
                            :class="recordBtnClass">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path v-if="!isRecording" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M12 18a5 5 0 005-5V8a5 5 0 10-10 0v5a5 5 0 005 5zm0 0v3m-4 0h8"></path>
                            <path v-else stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M6 6h12v12H6z"></path>
                        </svg>
                        <span class="flex flex-col items-center leading-tight">
                            <span class="text-lg">{{ isRecording ? '停止识别' : '开始录音识别' }}</span>
                            <span v-if="isRecording" class="text-[11px] font-semibold opacity-90 mt-0.5">{{ micHint }}</span>
                        </span>
                    </button>
                    <button @click="$refs.audioInput.click()" :disabled="!canCapture"
                            class="bg-white border border-blue-200 text-blue-600 py-4 rounded-2xl font-bold text-sm hover:bg-blue-50 transition shadow-sm flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 014-4h2l2-3h2l2 3h2a4 4 0 110 8H7a4 4 0 01-4-4z"></path>
                        </svg>
                        上传音频文件识别
                    </button>
                    <input type="file" ref="audioInput" accept="audio/*" class="hidden" @change="handleFileUpload">
                </div>
            </div>

            <div v-if="tempAudioPath" class="flex justify-center animate-in fade-in zoom-in duration-300">
                <div class="bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-4">
                    <span class="text-sm font-bold">刚刚录制：</span>
                    <custom-audio :src="tempAudioPath"></custom-audio>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="/static/js/app.js?v=2.9"></script>
    <script src="/static/js/login_parallax.js?v=2" defer></script>
</body>
</html>
